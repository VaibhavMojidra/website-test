                        <textarea id="ask-text-box" rows="1" oninput="onAskQueryChange()"
                            placeholder="Ask me anything"></textarea>
                        <div id="send-container">
                            <div class="send-button" onclick="onSend()"></div>
                        </div>
                    </div>
                </div>
            </div>
