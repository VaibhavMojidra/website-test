<body>

    <div id="search-info-dialog-container"></div>

    <div id="bottomsheet-container">
        <div id="bottomsheet-dismiss" onclick="closeFilterBottomSheet()"></div>
        <div id="bottomsheet-main-container">
            <div class="bottomsheet-header-row">
                <div class="close-bottomsheet-container">
                    <div class="close-bottomsheet" onclick="closeFilterBottomSheet()"></div>
                </div>
                <div class="bottomsheet-header">
                    <div class="bottomsheet-header-title">Search Filter</div>
                    <div class="bottomsheet-header-reset" onclick="resetFilter()">Reset</div>
                </div>
                <div class="bottomsheet-divider"></div>
            </div>
            <div id="bottomsheet-filters-container">
                <div class="filter-list" id="section-list">
                </div>
            </div>

            <div class="bottomsheet-apply-filter-container">
                <div class="apply-filters" onclick="applyFilters()">Apply Filters</div>
            </div>
        </div>
    </div>

    <div class="navbar-container" id="nav-bar-view">
        <div class="title-bar-container">
            <div class="back-and-title-container">
                <div class="back-button" onclick="goBackClick()"></div>
                <div class="roadmap-header-navbar">Universal Search</div>
            </div>
            <div id="search-info-icon" onclick="openSearchInfoDialog()"></div>
        </div>


        <div class="spacer" style="height: 4px;"></div>
        <div class="filter-container" id="filter-container-element">
            <div class="search-bar">
                <div class="search-icon-text-box"></div>
                <input id="search-text-box" type="text" oninput="onSearchQueryChange()" autocomplete="off"
                    placeholder="Search anything" onkeydown="handleEnterEquivalent(event)" />
                <div id="clear-icon-text-box" onclick="clearSearchQuery()"></div>
            </div>
            <div class="filter-button-container">
                <div class="filter" onclick="openFilterBottomSheet()">
                    <div id="filter-icon"></div>
                    <div id="filter-text">Filter</div>
                </div>
            </div>
        </div>
        <div class="spacer" style="height: 8px;"></div>
    </div>

    <div class="main-content" id="main-view"></div>
